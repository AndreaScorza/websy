<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NL - IT</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f0;
      font-family: Georgia, serif;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 56px;
      max-width: 600px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .label {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 12px;
    }
    .sentence-nl {
      font-size: 28px;
      color: #1a1a1a;
      margin-bottom: 32px;
      line-height: 1.4;
    }
    .sentence-it {
      font-size: 22px;
      color: #555;
      font-style: italic;
      margin-bottom: 48px;
      line-height: 1.4;
    }
    button {
      background: #1a1a1a;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #333; }
    .daily-badge {
      display: inline-block;
      background: #f0f0eb;
      color: #888;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="daily-badge">Zin van de dag</div>
    <div class="label">Nederlands</div>
    <div class="sentence-nl" id="nl">{{ sentence.nl }}</div>
    <div class="label">Italiano</div>
    <div class="sentence-it" id="it">{{ sentence.it }}</div>
    <button onclick="getNew()">Volgende zin</button>
  </div>
  <script>
    async function getNew() {
      const res = await fetch('/random');
      const data = await res.json();
      document.getElementById('nl').textContent = data.nl;
      document.getElementById('it').textContent = data.it;
    }
  </script>
</body>
</html>
