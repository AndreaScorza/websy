<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NL - IT</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f0;
      font-family: Georgia, serif;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 56px;
      max-width: 600px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .daily-badge {
      background: #f0f0eb;
      color: #888;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .lang-toggle {
      display: flex;
      gap: 8px;
    }
    .lang-btn {
      background: none;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 4px 6px;
      font-size: 22px;
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.2s, border-color 0.2s;
      line-height: 1;
    }
    .lang-btn.active {
      opacity: 1;
      border-color: #1a1a1a;
    }
    .label {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 12px;
    }
    .sentence-nl {
      font-size: 28px;
      color: #1a1a1a;
      margin-bottom: 32px;
      line-height: 1.4;
    }
    .sentence-translation {
      font-size: 22px;
      color: #555;
      font-style: italic;
      margin-bottom: 48px;
      line-height: 1.4;
    }
    .next-btn {
      background: #1a1a1a;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .next-btn:hover { background: #333; }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-bar">
      <div class="daily-badge">Spreekwoord van de dag</div>
      <div class="lang-toggle">
        <button class="lang-btn" id="btn-it" title="Italiano" onclick="setLang('it')">🇮🇹</button>
        <button class="lang-btn" id="btn-en" title="English" onclick="setLang('en')">🇬🇧</button>
      </div>
    </div>
    <div class="label">Nederlands</div>
    <div class="sentence-nl" id="nl">{{ sentence.nl }}</div>
    <div class="label" id="translation-label">Italiano</div>
    <div class="sentence-translation" id="translation">{{ sentence.it }}</div>
    <button class="next-btn" onclick="getNew()">Volgende zin</button>
  </div>
  <script>
    var current = {{ sentence | tojson }};
    var lang = 'it';

    function setLang(l) {
      lang = l;
      document.getElementById('btn-it').classList.toggle('active', l === 'it');
      document.getElementById('btn-en').classList.toggle('active', l === 'en');
      document.getElementById('translation-label').textContent = l === 'it' ? 'Italiano' : 'English';
      document.getElementById('translation').textContent = current[l];
    }

    async function getNew() {
      const res = await fetch('/random');
      current = await res.json();
      document.getElementById('nl').textContent = current.nl;
      document.getElementById('translation').textContent = current[lang];
    }

    setLang('it');
  </script>
</body>
</html>
